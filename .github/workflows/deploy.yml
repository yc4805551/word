name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_OPENAI_ENDPOINT: ${{ secrets.VITE_OPENAI_ENDPOINT }}
          VITE_OPENAI_MODEL: ${{ secrets.VITE_OPENAI_MODEL }}
          VITE_DEEPSEEK_API_KEY: ${{ secrets.VITE_DEEPSEEK_API_KEY }}
          VITE_DEEPSEEK_ENDPOINT: ${{ secrets.VITE_DEEPSEEK_ENDPOINT }}
          VITE_DEEPSEEK_MODEL: ${{ secrets.VITE_DEEPSEEK_MODEL }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_ALI_API_KEY: ${{ secrets.VITE_ALI_API_KEY }}
          VITE_ALI_ENDPOINT: ${{ secrets.VITE_ALI_ENDPOINT }}
          VITE_ALI_MODEL: ${{ secrets.VITE_ALI_MODEL }}
          VITE_DOUBAO_API_KEY: ${{ secrets.VITE_DOUBAO_API_KEY }}
          VITE_DOUBAO_ENDPOINT: ${{ secrets.VITE_DOUBAO_ENDPOINT }}
          VITE_DOUBAO_MODEL: ${{ secrets.VITE_DOUBAO_MODEL }}
          VITE_DEPOCR_API_KEY: ${{ secrets.VITE_DEPOCR_API_KEY }}
          VITE_DEPOCR_ENDPOINT: ${{ secrets.VITE_DEPOCR_ENDPOINT }}
          VITE_DEPOCR_MODEL: ${{ secrets.VITE_DEPOCR_MODEL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
